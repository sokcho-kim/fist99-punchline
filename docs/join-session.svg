  <!-- Input box -->
  <rect x="60" y="20" width="400" height="32" rx="4" fill="#252526" stroke="#007acc" stroke-width="1.5"/>
  <text x="76" y="41" fill="#cccccc" font-size="13">PPG55D</text>
