<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" font-family="Consolas, monospace">
  <!-- Background -->
  <rect width="720" height="340" fill="#1e1e1e"/>

  <!-- Toolbar -->
  <rect width="720" height="30" fill="#2d2d30"/>
  <text x="12" y="20" fill="#cccccc" font-size="12" font-weight="bold">project_final_v3_review.srt</text>
  <text x="220" y="20" fill="#808080" font-size="12">SRT</text>
  <text x="260" y="20" fill="#808080" font-size="12">UTF-8</text>
  <text x="600" y="20" fill="#808080" font-size="12">PPG55D</text>
  <rect x="660" y="7" width="45" height="18" rx="2" fill="none" stroke="#3c3c3c"/>
  <text x="670" y="20" fill="#808080" font-size="11">Copy</text>

  <!-- Column header -->
  <rect y="30" width="720" height="22" fill="#252526"/>
  <line x1="0" y1="52" x2="720" y2="52" stroke="#3c3c3c"/>
  <text x="20" y="45" fill="#808080" font-size="10">#</text>
  <text x="44" y="45" fill="#808080" font-size="10">TIMECODE</text>
  <text x="150" y="45" fill="#808080" font-size="10">SPEAKER</text>
  <text x="240" y="45" fill="#808080" font-size="10">SUBTITLE TEXT</text>

  <!-- Messages -->
  <text x="20" y="75" fill="#808080" font-size="13">1</text>
  <text x="44" y="75" fill="#d7ba7d" font-size="13">00:00:00:00</text>
  <text x="150" y="75" fill="#9cdcfe" font-size="13" font-weight="bold">editor1</text>
  <text x="240" y="75" fill="#cccccc" font-size="13">Intro scene — check audio sync</text>
  <line x1="0" y1="82" x2="720" y2="82" stroke="#2a2a2a"/>

  <text x="20" y="105" fill="#808080" font-size="13">2</text>
  <text x="44" y="105" fill="#d7ba7d" font-size="13">00:00:03:14</text>
  <text x="150" y="105" fill="#ce9178" font-size="13" font-weight="bold">editor2</text>
  <text x="240" y="105" fill="#cccccc" font-size="13">Looks off by ~2 frames</text>
  <line x1="0" y1="112" x2="720" y2="112" stroke="#2a2a2a"/>

  <text x="20" y="135" fill="#808080" font-size="13">3</text>
  <text x="44" y="135" fill="#d7ba7d" font-size="13">00:00:05:02</text>
  <text x="150" y="135" fill="#9cdcfe" font-size="13" font-weight="bold">editor1</text>
  <text x="240" y="135" fill="#cccccc" font-size="13">Will fix in next pass</text>
  <line x1="0" y1="142" x2="720" y2="142" stroke="#2a2a2a"/>

  <text x="20" y="165" fill="#808080" font-size="13">4</text>
  <text x="44" y="165" fill="#d7ba7d" font-size="13">00:00:08:21</text>
  <text x="150" y="165" fill="#ce9178" font-size="13" font-weight="bold">editor2</text>
  <text x="240" y="165" fill="#cccccc" font-size="13">Also cut is too slow at 01:32</text>
  <line x1="0" y1="172" x2="720" y2="172" stroke="#2a2a2a"/>

  <text x="20" y="195" fill="#808080" font-size="13">5</text>
  <text x="44" y="195" fill="#d7ba7d" font-size="13">00:00:12:07</text>
  <text x="150" y="195" fill="#9cdcfe" font-size="13" font-weight="bold">editor1</text>
  <text x="240" y="195" fill="#cccccc" font-size="13">Noted, will trim 8 frames there</text>
  <line x1="0" y1="202" x2="720" y2="202" stroke="#2a2a2a"/>

  <text x="20" y="225" fill="#808080" font-size="13">6</text>
  <text x="44" y="225" fill="#d7ba7d" font-size="13">00:00:15:19</text>
  <text x="150" y="225" fill="#ce9178" font-size="13" font-weight="bold">editor2</text>
  <text x="240" y="225" fill="#cccccc" font-size="13">Perfect. Rendering now</text>
  <line x1="0" y1="232" x2="720" y2="232" stroke="#2a2a2a"/>

  <!-- Input area -->
  <rect y="290" width="720" height="50" fill="#252526"/>
  <line x1="0" y1="290" x2="720" y2="290" stroke="#3c3c3c"/>
  <text x="20" y="320" fill="#808080" font-size="13">7</text>
  <text x="44" y="320" fill="#d7ba7d" font-size="13">00:00:18:03</text>
  <text x="150" y="320" fill="#9cdcfe" font-size="13" font-weight="bold">editor1</text>
  <rect x="238" y="304" width="400" height="24" rx="2" fill="#1e1e1e" stroke="#3c3c3c"/>
  <text x="246" y="320" fill="#808080" font-size="13">Enter subtitle text...</text>
  <rect x="648" y="304" width="55" height="24" rx="2" fill="none" stroke="#3c3c3c"/>
  <text x="663" y="320" fill="#808080" font-size="11">Add</text>
</svg>
